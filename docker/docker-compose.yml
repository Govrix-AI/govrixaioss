version: '3.9'

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  agentland:
    driver: bridge

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL + TimescaleDB ───────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: agentland-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentland
      POSTGRES_USER: agentland
      POSTGRES_PASSWORD: agentland_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Run init SQL on first start
      - ../init:/docker-entrypoint-initdb.d:ro
    networks:
      - agentland
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentland -d agentland"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Agentland Proxy + API ──────────────────────────────────────────────────
  proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agentland-proxy
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AGENTLAND_DATABASE_URL: postgres://agentland:agentland_dev@postgres:5432/agentland
      AGENTLAND_PROXY_PORT: "4000"
      AGENTLAND_API_PORT: "4001"
      RUST_LOG: "agentland_proxy=info,tower_http=debug"
      AGENTLAND_PROXY__UPSTREAM_OPENAI: "https://api.openai.com"
    ports:
      - "4000:4000"   # Proxy (hot path)
      - "4001:4001"   # REST API
      - "9090:9090"   # Prometheus metrics
    networks:
      - agentland
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── React Dashboard (nginx) ────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: agentland-dashboard
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - agentland
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
